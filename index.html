<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Carte vCard — Jonathan Cordeiro-Dansereau</title>
  <meta name="description" content="Carte de visite virtuelle avec téléchargement vCard." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root{--blue-900:#0b5175;--blue-800:#0c6692;--ink:#114862;--muted:#3c6579;--white:#fff;--line:rgba(17,72,98,.14);--shadow:0 18px 48px rgba(8,45,68,.14);--r-xl:26px;--r-full:999px}
    *{box-sizing:border-box} body{margin:0;min-height:100vh;font-family:Montserrat,Arial,sans-serif;background:linear-gradient(180deg,#eef6fb 0%,#f8fbfd 100%);color:var(--ink);display:grid;place-items:center;padding:16px}
    .wrapper{width:min(1020px,100%)} .card{position:relative;border-radius:var(--r-xl);overflow:hidden;background:var(--white);box-shadow:var(--shadow);border:1px solid rgba(17,72,98,.09);display:grid;grid-template-columns:1.05fr .95fr;min-height:420px}
    .left{padding:34px 34px 30px;display:flex;flex-direction:column;justify-content:center;gap:18px;background:linear-gradient(180deg,rgba(255,255,255,.99),rgba(255,255,255,.97))}
    .right{position:relative;overflow:hidden;background:linear-gradient(135deg,var(--blue-800) 0%,#0b5f88 40%,#0a6ea0 100%);display:grid;place-items:center}
    .right::before{content:"";position:absolute;inset:-8%;background-image:linear-gradient(rgba(255,255,255,.10) 2px,transparent 2px),linear-gradient(90deg,rgba(255,255,255,.10) 2px,transparent 2px);background-size:92px 92px;transform:rotate(45deg) scale(1.18);opacity:.28}
    .logo-mark{width:122px;height:122px;transform:rotate(45deg);border-radius:18px;background:linear-gradient(180deg,#0b6a98,#2a97cb);border:3px solid rgba(255,255,255,.9);box-shadow:0 12px 24px rgba(10,61,90,.18);display:grid;place-items:center;overflow:hidden;position:relative;z-index:1}.logo-mark span{transform:rotate(-45deg);color:#fff;text-align:center;font-weight:700;line-height:1;font-size:.95rem;letter-spacing:-.03em}.logo-mark small{display:block;margin-top:4px;font-size:.58rem;font-weight:600;letter-spacing:.02em}
    .name{margin:0;font-size:clamp(1.85rem,3.5vw,2.7rem);line-height:.98;font-weight:800;color:var(--ink);letter-spacing:-.045em;text-transform:uppercase;max-width:11ch}.role{margin:-6px 0 0;font-size:1rem;color:var(--muted);font-weight:500}
    .contact{display:grid;gap:10px;margin-top:2px}.row{display:flex;align-items:center;gap:10px;color:var(--ink);text-decoration:none;width:fit-content}.row strong{font-size:clamp(1.15rem,1.8vw,1.55rem);line-height:1;letter-spacing:-.03em}.row span{color:var(--muted)}.icon{width:20px;height:20px;color:var(--blue-900);flex:0 0 auto}
    .agency{display:grid;gap:3px}.agency-title{margin:0;color:var(--blue-900);font-weight:800;font-size:1.05rem;letter-spacing:-.02em;text-transform:uppercase}.agency-sub{margin:0;color:var(--muted);font-size:.98rem}
    .social{display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin-top:2px}.social-title{margin:0;font-weight:700;color:var(--blue-900);font-size:.95rem}.social-icons{display:flex;gap:10px}.social-link{width:38px;height:38px;border-radius:50%;border:1.5px solid rgba(17,72,98,.24);display:grid;place-items:center;color:var(--blue-900);text-decoration:none;background:#fff}
    .actions{display:flex;flex-wrap:wrap;gap:10px;margin-top:4px}.btn{min-height:46px;display:inline-flex;align-items:center;justify-content:center;padding:13px 17px;border-radius:var(--r-full);text-decoration:none;font-weight:700;border:1px solid transparent;font-size:.95rem;cursor:pointer}.btn-primary{background:var(--blue-800);color:#fff}.btn-secondary{background:#fff;color:var(--ink);border-color:var(--line)}
    @media (max-width:860px){.card{grid-template-columns:1fr}.right{min-height:220px}.logo-mark{width:110px;height:110px}}
    @media (max-width:640px){body{padding:10px}.left{padding:22px}.actions{flex-direction:column}.btn{width:100%}}
  </style>
</head>
<body>
  <main class="wrapper">
    <section class="card" aria-label="Carte de visite">
      <div class="left">
        <header>
          <h1 class="name">Jonathan Cordeiro-Dansereau</h1>
          <p class="role">Courtier immobilier résidentiel</p>
        </header>
        <section class="contact" aria-label="Coordonnées">
          <a class="row" href="tel:+15142345333"><svg class="icon" viewBox="0 0 24 24" fill="currentColor"><path d="M6.62 10.79a15.05 15.05 0 0 0 6.59 6.59l2.2-2.2a1 1 0 0 1 1.01-.24c1.12.37 2.33.57 3.58.57a1 1 0 0 1 1 1V20a1 1 0 0 1-1 1C10.07 21 3 13.93 3 5a1 1 0 0 1 1-1h3.49a1 1 0 0 1 1 1c0 1.25.2 2.46.57 3.58a1 1 0 0 1-.24 1.01z"/></svg><strong>514 234-5333</strong></a>
          <a class="row" href="mailto:jcordeiro-dansereau@viacapitale.com"><svg class="icon" viewBox="0 0 24 24" fill="currentColor"><path d="M4 6h16a2 2 0 0 1 2 2v.35l-10 6.25L2 8.35V8a2 2 0 0 1 2-2zm18 4.67V16a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2v-5.33l9.47 5.92a1 1 0 0 0 1.06 0L22 10.67z"/></svg><span>jcordeiro-dansereau@viacapitale.com</span></a>
        </section>
        <section class="agency">
          <p class="agency-title">Via Capitale Expertise</p>
          <p class="agency-sub">Agence immobilière</p>
        </section>
        <section class="social" aria-label="Réseaux sociaux">
          <p class="social-title">Suivez-moi&nbsp;!</p>
          <div class="social-icons">
            <a class="social-link" href="https://www.facebook.com/share/1Exs1csnhp/?mibextid=wwXIfr" target="_blank" rel="noopener noreferrer" aria-label="Facebook"><svg width="17" height="17" viewBox="0 0 24 24" fill="currentColor"><path d="M13.5 22v-8h2.7l.4-3h-3.1V9.1c0-.9.3-1.5 1.6-1.5H17V4.9c-.3 0-1.3-.1-2.5-.1-2.5 0-4.2 1.5-4.2 4.4V11H7.5v3h2.8v8h3.2z"/></svg></a>
            <a class="social-link" href="https://www.instagram.com/jonathan_cordeiro_immoblier?igsh=MXBlbnQ2bHQ3YnltYw%3D%3D&utm_source=qr" target="_blank" rel="noopener noreferrer" aria-label="Instagram"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="5"></rect><circle cx="12" cy="12" r="4"></circle><circle cx="17.5" cy="6.5" r="1"></circle></svg></a>
            <a class="social-link" href="#" aria-label="TikTok"><svg width="17" height="17" viewBox="0 0 24 24" fill="currentColor"><path d="M15 3c.4 1.9 1.5 3.2 3.5 4v2.6c-1.3 0-2.4-.3-3.5-.9v6.4c0 3-2.4 5.4-5.4 5.4S4.2 18.1 4.2 15.1 6.6 9.7 9.6 9.7c.3 0 .7 0 1 .1V13a2.8 2.8 0 0 0-1-.2 2.3 2.3 0 0 0-2.3 2.3 2.3 2.3 0 0 0 2.3 2.3 2.4 2.4 0 0 0 2.4-2.3V3H15z"/></svg></a>
          </div>
        </section>
        <div class="actions">
          <a class="btn btn-primary" id="downloadVcf" href="#">Télécharger la fiche de contact en .vcf</a>
          <a class="btn btn-secondary" href="mailto:jcordeiro-dansereau@viacapitale.com">Courriel</a>
        </div>
      </div>
      <div class="right" aria-hidden="true">
        <div class="logo-mark"><span>viacapitale<small>EXPERTISE</small></span></div>
      </div>
    </section>
  </main>
  <script>
    const c={firstName:'Jonathan',lastName:'Cordeiro-Dansereau',fullName:'Jonathan Cordeiro-Dansereau',role:'Courtier immobilier résidentiel',company:'VIA CAPITALE EXPERTISE',phone:'+15142345333',email:'jcordeiro-dansereau@viacapitale.com',country:'Canada'};
    const e=v=>String(v||'').replace(/\/g,'\\').replace(/
/g,'\n').replace(/,/g,'\,').replace(/;/g,'\;');
    const v=[`BEGIN:VCARD`,`VERSION:3.0`,`N:${e(c.lastName)};${e(c.firstName)};;;`,`FN:${e(c.fullName)}`,`ORG:${e(c.company)}`,`TITLE:${e(c.role)}`,`TEL;TYPE=CELL:${e(c.phone)}`,`EMAIL;TYPE=INTERNET:${e(c.email)}`,`ADR;TYPE=WORK:;;;;;;${e(c.country)}`,`END:VCARD`].join('
');
    const blob=new Blob([v],{type:'text/vcard;charset=utf-8'}),url=URL.createObjectURL(blob);
    const btn=document.getElementById('downloadVcf');
    btn.href=url;
    btn.download='jonathan-cordeiro-dansereau.vcf';
    btn.addEventListener('click',()=>setTimeout(()=>URL.revokeObjectURL(url),1000));
  </script>
</body>
</html>
